# ============================================================
# Rackvio Community Edition — Self-Hosted Deployment
#
# Quick start:
#   cp .env.example .env
#   # edit .env — set PLATFORM_ADMIN_EMAIL and AUTH_SECRET
#   docker compose up -d
#
# First login: open http://localhost:3000, check backend logs
# for the temporary password:
#   docker compose logs backend | grep "temporary password"
# ============================================================

services:
  backend:
    image: ghcr.io/rackvio/rackvio-backend:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://rackvio_app:${APP_DB_PASS:-devpassword}@postgres:5432/rackvio
      DATABASE_MIGRATIONS_URL: postgresql+asyncpg://rackvio_migrations:${MIGRATIONS_DB_PASS:-devpassword}@postgres:5432/rackvio
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${AUTH_SECRET}
      DEPLOYMENT_MODE: self_hosted
      PLATFORM_ADMIN_EMAIL: ${PLATFORM_ADMIN_EMAIL}
      ALLOWED_ORIGINS: "http://localhost:3000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    image: ghcr.io/rackvio/rackvio-frontend:latest
    restart: unless-stopped
    environment:
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: http://localhost:3000
      BACKEND_INTERNAL_URL: http://backend:8000/api
      DEPLOYMENT_MODE: self_hosted
      PLATFORM_ADMIN_EMAIL: ${PLATFORM_ADMIN_EMAIL}
    ports:
      - "3000:3000"
    depends_on:
      - backend

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: rackvio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASS:-devpassword}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rackvio"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Create application database roles on first startup.
    # Inlined here so customers only need docker-compose.yml + .env.
    entrypoint:
      - bash
      - -c
      - |
        # Write the init script from inline content
        mkdir -p /docker-entrypoint-initdb.d
        cat > /docker-entrypoint-initdb.d/01-create-roles.sh << 'INITEOF'
        #!/bin/bash
        set -e
        psql -v ON_ERROR_STOP=1 --username "$$POSTGRES_USER" --dbname "$$POSTGRES_DB" <<-EOSQL
          CREATE USER rackvio_app WITH PASSWORD '$$APP_DB_PASS';
          CREATE USER rackvio_migrations WITH PASSWORD '$$MIGRATIONS_DB_PASS' CREATEROLE BYPASSRLS;
          ALTER DATABASE rackvio OWNER TO rackvio_migrations;
          GRANT ALL PRIVILEGES ON DATABASE rackvio TO rackvio_migrations;
          GRANT CONNECT ON DATABASE rackvio TO rackvio_app;
          \c rackvio
          ALTER DEFAULT PRIVILEGES FOR ROLE rackvio_migrations
            GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO rackvio_app;
          ALTER DEFAULT PRIVILEGES FOR ROLE rackvio_migrations
            GRANT USAGE, SELECT ON SEQUENCES TO rackvio_app;
          GRANT USAGE ON SCHEMA public TO rackvio_app;
        EOSQL
        INITEOF
        chmod +x /docker-entrypoint-initdb.d/01-create-roles.sh
        # Pass env vars through and run the original entrypoint
        export APP_DB_PASS="${APP_DB_PASS:-devpassword}"
        export MIGRATIONS_DB_PASS="${MIGRATIONS_DB_PASS:-devpassword}"
        exec docker-entrypoint.sh postgres

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  redis_data:
